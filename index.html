<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTNER MATCH — Find a hitting partner in 60 seconds</title>
<meta name="description" content="NYC tennis. Find a hitting partner in 60 seconds. All boroughs. All levels. Free. No app to download.">
<meta property="og:title" content="PARTNER MATCH">
<meta property="og:description" content="Find a hitting partner in 60 seconds. NYC tennis. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://partnermatch.io">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  @font-face {
    font-family: 'Square721';
    src: url('square721-bold-ext.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Square721', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 100%;
    max-width: 600px;
    padding: 10dvh 6vw;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo {
    width: 66%;
    max-width: 320px;
    height: auto;
    margin-bottom: 7vh;
    opacity: 0;
    animation: up .5s ease .1s forwards;
  }

  h1 {
    font-size: clamp(24px, 9vw, 48px);
    line-height: 1.1;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: #00ff00;
    margin-bottom: clamp(16px, 3vh, 28px);
    opacity: 0;
    animation: up .5s ease .2s forwards;
  }

  .sub {
    font-size: clamp(11px, 3.2vw, 17px);
    line-height: 1.5;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: clamp(4px, 1vh, 8px);
    opacity: 0;
    animation: up .5s ease .3s forwards;
  }

  .small {
    font-size: clamp(9px, 2.4vw, 13px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: clamp(24px, 5vh, 40px);
    opacity: 0;
    animation: up .5s ease .4s forwards;
  }

  .cta {
    display: inline-block;
    padding: clamp(12px, 2.5vh, 18px) clamp(28px, 8vw, 48px);
    background: #00ff00;
    color: #000;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(12px, 3vw, 16px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease;
    opacity: 0;
    animation: up .5s ease .5s forwards;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,255,0,.25); }
  .cta:active { transform: translateY(0); box-shadow: none; }

  .foot {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 14px;
    text-align: center;
    font-size: clamp(8px, 1.8vw, 10px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #2a2a2a;
  }
  @media (max-height: 600px) { .foot { position: relative; margin-top: 6vh; } }

  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo, h1, .sub, .small, .cta { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<div class="page">
  <img src="logo-green.svg" alt="PARTNER MATCH" class="logo">
  <h1>Find a hitting<br>partner in 60<br>seconds.</h1>
  <p class="sub">NYC tennis. All boroughs.<br>All levels. Free.</p>
  <p class="small">No app to download. Just Slack.</p>
  <a href="https://join.slack.com/t/partnermatch/shared_invite/zt-3s50e7zr9-FHEx_kJtc7tah6_RwrHNpQ" class="cta">Join the Community</a>
</div>
<div class="foot">Partner Match — NYC 2026</div>
</body>
</html>

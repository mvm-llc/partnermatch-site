<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTNER MATCH — Hitting a wall? Find a partner.</title>
<meta name="description" content="NYC tennis. Find a hitting partner in 60 seconds. All boroughs. All levels. Free. No app to download.">
<meta property="og:title" content="PARTNER MATCH">
<meta property="og:description" content="Hitting a wall? Find a partner. NYC tennis. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://partnermatch.io">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  @font-face {
    font-family: 'Square721';
    src: url('square721-bold-ext.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #000;
    font-family: 'Square721', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 6vh 6vw;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* ── Logo stack — left aligned ── */
  .logo-stack {
    width: clamp(160px, 40vw, 280px);
    height: auto;
    margin-bottom: 8vh;
    opacity: 0;
    animation: up .5s ease .1s forwards;
  }

  /* ── Main content — centered ── */
  .content {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    justify-content: center;
  }

  h1 {
    font-size: clamp(28px, 9vw, 56px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: #000;
    margin-bottom: clamp(20px, 4vh, 36px);
    opacity: 0;
    animation: up .5s ease .2s forwards;
  }

  h1 .green {
    color: #00ff00;
  }

  .sub {
    font-size: clamp(13px, 3.5vw, 20px);
    line-height: 1.5;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #000;
    margin-bottom: clamp(6px, 1.5vh, 12px);
    opacity: 0;
    animation: up .5s ease .3s forwards;
  }

  .small {
    font-size: clamp(10px, 2.5vw, 14px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: clamp(28px, 5vh, 48px);
    opacity: 0;
    animation: up .5s ease .4s forwards;
  }

  .cta {
    display: inline-block;
    padding: clamp(14px, 3vh, 20px) clamp(32px, 10vw, 56px);
    background: #00ff00;
    color: #000;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(13px, 3.2vw, 18px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease;
    opacity: 0;
    animation: up .5s ease .5s forwards;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,255,0,.3); }
  .cta:active { transform: translateY(0); box-shadow: none; }

  .guidelines-link {
    display: inline-block;
    margin-top: clamp(16px, 3vh, 24px);
    font-size: clamp(10px, 2.4vw, 12px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    color: #bbb;
    transition: color .15s ease;
    opacity: 0;
    animation: up .5s ease .6s forwards;
  }
  .guidelines-link:hover { color: #888; }

  /* ── Footer ── */
  .foot {
    padding: clamp(16px, 3vh, 24px) 6vw;
    text-align: center;
    font-size: clamp(9px, 2vw, 11px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .foot .cyan { color: #00ffff; }
  .foot .yellow { color: #ffff00; }
  .foot .magenta { color: #ff00ff; }

  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo-stack, h1, .sub, .small, .cta, .guidelines-link { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Logo stack: all 5 colors, left-aligned -->
  <img src="logo-stack.png" alt="PARTNER MATCH" class="logo-stack">

  <div class="content">
    <h1>Hitting a wall?<br><span class="green">Find a partner.</span></h1>
    <p class="sub">NYC tennis. All boroughs.<br>All levels. Free.</p>
    <p class="small">No app to download. Just Slack.</p>
    <a href="#" class="cta">Join the community</a>
    <a href="/guidelines" class="guidelines-link">Community Guidelines</a>
  </div>
</div>

<div class="foot">
  <span class="cyan">Partner Match</span>
  <span class="yellow"> — </span>
  <span class="magenta">NYC 2026</span>
</div>

</body>
</html>
